
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="./styles/main.css">
    <script src="https://kit.fontawesome.com/c5d333bbd9.js" crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <main>
        <nav>
            <div class="login">
                <h1 class="hz">EFETUE O LOGIN</h1>
                <p class="hy">Digite os seus dados de acesso no campo abaixo.</p> 
            
                <i class="fa-solid fa-user" id="user"></i><input type="texto" id="inputLogin" placeholder=" Nome do Usúario">
                <i class="fa-solid fa-lock" id="cad"></i><input type="senha" id="inputSenha" placeholder="Digite sua senha">
                <i class="fa-solid fa-right-to-bracket" id="res"></i><input type="submit" onclick="login(); return false" class="result">
            </div>  
        </nav>
    </main>
    <script src="./js/login.js"></script>
</body>
</html>
